name: build support images

on:
  workflow_dispatch: {}
  # schedule:
  #   - cron: "13 5 * * 0"

jobs:
  build_support_images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        images: [nginx_good, nginx_bad, postfix_bad, mariadb_good, debian-weakkeys]

    name: Build Support Images
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build support image ${{ matrix.images }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: test_setup/conf/${{ matrix.images }}
          push: true
          tags: ghcr.io/jsandas/${{ matrix.images }}
